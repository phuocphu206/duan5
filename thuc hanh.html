<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chào các bạn</title>

    <style>
      body {
        margin-left: 200px;
        margin-top: 200px;
        color: blue;
        font-family: Arial;
      }

      h1 {
        color: crimson;
      }

      .poem {
        color: crimson;
      }
    </style>
  </head>

  <body>
    <h1>Bài Thơ Về Quê Hương</h1>

    <!-- Marquee chạy chữ -->
    <marquee behavior="scroll" direction="left" scrollamount="5">
      🌾 Chào mừng đến với trang thơ quê hương 🌾
    </marquee>

    <br />

    <img src="anh-que-huong-1.jpg" alt="Quê hương" width="600" />

    <p class="poem">
      QUÊ HƯƠNG <br />
      QUÊ HƯƠNG LÀ CHÙM KHẾ NGỌT <br />
      CHO CON TRÈO HÁI MỖI NGÀY <br />
      QUÊ HƯƠNG LÀ ĐƯỜNG ĐI HỌC <br />
      CON VỀ RỢP BƯỚM VÀNG BAY.<br />
    </p>
  </body>
</html>
